services:
  postgres:
    image: postgres:16-alpine
    container_name: sullyuwha-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sullyuwha
      POSTGRES_PASSWORD: sullyuwha_local
      POSTGRES_DB: sullyuwha
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sullyuwha"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sullyuwha-storage
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_local
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO bucket init (runs once after minio is healthy)
  minio-init:
    image: minio/mc:latest
    container_name: sullyuwha-storage-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin_local &&
      mc mb local/sullyuwha-assets --ignore-existing &&
      echo 'MinIO bucket ready'
      "

volumes:
  pgdata:
  minio_data:
